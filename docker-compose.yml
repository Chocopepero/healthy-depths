services:
  backend:
    build: ./depth-backend
    ports:
      - "8000:8000"
    env_file: ./depth-backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./depth-frontend
    ports:
      - "5173:5173"
    env_file: ./depth-frontend/.env
    depends_on:
      backend:
        condition: service_healthy
