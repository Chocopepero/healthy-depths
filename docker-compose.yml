services:
  backend:
    build: ./depth-backend
    ports:
      - "8000:8000"
    env_file: ./depth-backend/.env
    volumes:
      - ./depth-backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./depth-frontend
      target: builder
    command: npm run dev
    ports:
      - "5173:5173"
    env_file: ./depth-frontend/.env
    volumes:
      - ./depth-frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
